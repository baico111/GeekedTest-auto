name: Qt-Cool Auto Checkin
on:
  schedule:
    - cron: '30 2 * * *' # 每天北京时间上午 10:30 运行
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx # OpenCV 运行必须的系统库

      - name: Install Python Libs
        run: |
          pip install seleniumbase opencv-python-headless numpy requests pycryptodome

      - name: Run Qt-Cool Script
        env:
          QTCOOL_SK: ${{ secrets.QTCOOL_SK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: python qt_cool.py
