name: Qt-Cool Auto Checkin
on:
  schedule:
    - cron: '30 2 * * *' # 每天北京时间上午 10:30 运行
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # 开启缓存，加速后续运行

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 适配 Ubuntu 24.04：用 libgl1 替换掉过时的 libgl1-mesa-glx
          # 必须安装 xvfb 才能使用 xvfb-run 命令
          sudo apt-get install -y libgl1 libglib2.0-0 git xvfb

      - name: Install Python Dependencies
        run: |
          # 升级 pip
          python -m pip install --upgrade pip
          # 按照你的 requirements.txt 安装所有专业算法库
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # 确保业务核心库 seleniumbase 已安装
          pip install seleniumbase

      - name: Run Qt-Cool Script
        env:
          QTCOOL_SK: ${{ secrets.QTCOOL_SK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        # xvfb-run 会创建一个虚拟的图形显示环境，让浏览器指纹更真实
        run: xvfb-run python qt_cool.py
